server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:petstore.db?foreign_keys=on
    username:
    password:
    hikari:
      maximum-pool-size: 5
  jpa:
    database-platform: org.sqlite.hibernate.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

file:
  upload-dir: ${user.dir}/src/main/resources/static/uploads

ai:
  api-key: your-api-key-here
  endpoint: https://api.openai.com/v1/chat/completions
  model: gpt-3.5-turbo